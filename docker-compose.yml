# ============================================================
#  FinTrack — Docker Compose
#  Architecture:
#    postgres        ← shared database
#    fintrack-api    ← REST API + internal endpoints (port 8080)
#    bot-gateway     ← Telegram bot orchestrator (no DB, no port)
#    home-server     ← Home server management (port 8090)
# ============================================================

services:

  # ─────────────────────────────────────────────
  #  PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fintrack
      POSTGRES_USER:     fintrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  #  FinTrack API — REST API + Internal Endpoints
  # ─────────────────────────────────────────────
  fintrack-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: fintrack-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ./backend/.env
    networks:
      - fintrack-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  #  Bot Gateway — Telegram Orchestrator
  #  No DB access. Calls fintrack-api via HTTP.
  # ─────────────────────────────────────────────
  bot-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: bot
    container_name: fintrack-bot-gateway
    restart: unless-stopped
    depends_on:
      fintrack-api:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN:   ${TELEGRAM_BOT_TOKEN}
      FINTRACK_API_URL:     http://fintrack-api:8080
      GATEWAY_API_KEY:      ${GATEWAY_API_KEY}
      HOME_SERVER_URL:      http://home-server:8090
      HOME_SERVER_API_KEY:  ${HOME_SERVER_API_KEY}
      EXPENSE_TRACKER_API_URL: http://expense-tracker-api:8000
      # n8n — optional, kosongkan untuk disable
      N8N_URL:              ${N8N_URL:-http://n8n:5678}
      N8N_API_KEY:          ${N8N_API_KEY:-}
    networks:
      - fintrack-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────────
  #  Home Server — Server Management Service
  # ─────────────────────────────────────────────
  home-server:
    build:
      context: ./home-server
      dockerfile: Dockerfile
    container_name: fintrack-home-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      # Mount host scripts directory for script execution
      - ./home-server/scripts:/app/scripts:ro
      # Allow systemctl to control host (requires privileged or specific caps)
      - /run/systemd/private:/run/systemd/private
    environment:
      API_KEY:     ${HOME_SERVER_API_KEY}
      ALLOWED_IPS: 172.16.0.0/12,127.0.0.1
      SCRIPTS_DIR: /app/scripts
    networks:
      - fintrack-net
    # Required for systemctl suspend/shutdown/reboot to work
    privileged: true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
    driver: local

networks:
  fintrack-net:
    driver: bridge
    name: fintrack-network
    # attachable: true agar service dari docker-compose lain (services/) bisa join
    attachable: true
