# ============================================================
#  FinTrack — Docker Compose (Cloudflare Tunnel Mode)
#  Mode: Frontend → Vercel | Backend + DB → VPS via Cloudflare
# ============================================================

services:

  # ─────────────────────────────────────────────
  #  PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fintrack
      POSTGRES_USER:     fintrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  #  Backend: Go REST API + Telegram Webhook Handler
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ./backend/.env
    networks:
      - fintrack-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
    driver: local

networks:
  fintrack-net:
    driver: bridge
    name: fintrack-network
