# ============================================================
#  FinTrack — Docker Compose (Production VPS)
#  Mode: Frontend → Vercel | Backend + Bot → VPS
#  Referensi: DreamAPI_bot_Generative (logging config),
#             DreamAPI_bot (volume pattern),
#             Leo-bot-new (restart policy)
# ============================================================

services:

  # ─────────────────────────────────────────────
  #  Backend: Go REST API + Telegram Webhook Handler
  #  (Frontend ada di Vercel, tidak perlu di sini)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - ./backend/.env
    volumes:
      # Firebase credentials (wajib ada sebelum deploy)
      - ./backend/configs:/app/configs:ro
    networks:
      - fintrack-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  #  Nginx: Reverse Proxy + SSL Termination
  #  Hanya serve backend API (frontend → Vercel)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fintrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - fintrack-net
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────────
  #  Certbot: SSL Certificate Auto-Renewal
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: fintrack-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Renew certificates every 12 hours
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

networks:
  fintrack-net:
    driver: bridge
    name: fintrack-network
