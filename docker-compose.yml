# ============================================================
#  FinTrack — Docker Compose (Cloudflare Tunnel Mode)
#  Mode: Frontend → Vercel | Backend + Bot → VPS via Cloudflare
# ============================================================

services:

  # ─────────────────────────────────────────────
  #  Backend: Go REST API + Telegram Webhook Handler
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/configs:/app/configs:ro
    networks:
      - fintrack-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  fintrack-net:
    driver: bridge
    name: fintrack-network

