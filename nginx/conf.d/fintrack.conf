# ============================================================
#  Nginx Virtual Host — FinTrack API (Backend Only)
#  Mode: Frontend → Vercel | Backend API → VPS
#  Ganti YOUR_DOMAIN.COM dengan domain backend kamu
# ============================================================

# ── Step 1: HTTP → HTTPS redirect + ACME challenge ──────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Step 2: HTTPS — Backend API Server ──────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN.COM;

    # SSL Certificates
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN.COM/chain.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    client_max_body_size 10M;

    # ── CORS — izinkan request dari Vercel domain ────────────
    # Daftar semua origin yang diizinkan
    map $http_origin $cors_origin {
        default                                    "";
        "~^https://YOUR_VERCEL_APP\.vercel\.app$"  $http_origin;
        "~^https://YOUR_CUSTOM_FRONTEND_DOMAIN$"   $http_origin;
        # Tambahkan preview URLs Vercel jika perlu:
        # "~^https://fintrack-[\w-]+\.vercel\.app$" $http_origin;
    }

    # ── Telegram Webhook Endpoint ────────────────────────────
    location /api/v1/telegram/webhook {
        limit_req zone=webhook_limit burst=20 nodelay;

        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;
    }

    # ── Backend REST API ─────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        # CORS headers (untuk Vercel frontend)
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8080;
        access_log off;

        # Allow dari mana saja (untuk monitoring tools)
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Block semua path lain (tidak ada frontend di VPS) ───
    location / {
        return 404 '{"error": "FinTrack API — frontend tersedia di Vercel"}';
        add_header Content-Type application/json always;
    }
}
