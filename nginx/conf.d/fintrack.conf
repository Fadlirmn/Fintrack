# ============================================================
#  Nginx Virtual Host — FinTrack API (Cloudflare Tunnel)
#  Domain: server.home-sumbul.my.id
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name server.home-sumbul.my.id;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    client_max_body_size 10M;

    # ── CORS — allowed origins map ───────────────────────────
    map $http_origin $cors_origin {
        default                                    "";
        "~^https://YOUR_VERCEL_APP\.vercel\.app$"  $http_origin;
        "~^https://YOUR_CUSTOM_FRONTEND_DOMAIN$"   $http_origin;
    }

    # ── Telegram Webhook Endpoint ────────────────────────────
    location /api/v1/telegram/webhook {
        limit_req zone=webhook_limit burst=20 nodelay;

        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;
    }

    # ── Backend REST API ─────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        # CORS headers (untuk Vercel frontend)
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8080;
        access_log off;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Block path lainnya ──────────────────────────────────
    location / {
        return 404 '{"error": "FinTrack API — frontend tersedia di Vercel"}';
        add_header Content-Type application/json always;
    }
}
